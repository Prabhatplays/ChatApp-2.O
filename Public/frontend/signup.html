<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create New Account</title>
</head>
<body>
  <div class="box">
    <h1>Create New Account</h1>
    <div class="form">
      <form action="">
        <input type="text" placeholder="username"><br>
        <input type="tel" placeholder="number"><br>
        <input type="email" placeholder="email address"><br>
        
        <div class="gender"><br>
          <header>Gender</header>
          <label>Male <input type="radio" name="gender" value="male"></label><br>
          <label>Female <input type="radio" name="gender" value="female"></label><br>
          <label>Other <input type="radio" name="gender" value="other"></label><br>
        </div>

        <label for="age"><input type="date"> age</label><br>
        <input type="submit" class="submit" value="createaccount"> 

        <!-- Correct relative link -->
        <button type="button" onclick="window.location.href='index.html'">Login Page</button>
      </form>
    </div>
  </div>
</body>
</html>
